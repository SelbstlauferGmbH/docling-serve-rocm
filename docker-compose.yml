services:
  docling-serve: 
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UV_SYNC_EXTRA_ARGS: --no-group pypi --group rocm --no-extra flash-attn
    env_file: 
      - .env
    labels:
      - traefik.http.routers.api-doclingserve-zijchw-4-websecure.middlewares=octonona-allowlist@file
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    security_opt:
      - seccomp=unconfined
    group_add:
      - video
      - render
    restart: "no"
    shm_size: "32g"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 60s
      timeout: 30s
      start_period: 180s
      retries: 5
networks:
  dokploy-network:
    external: true
