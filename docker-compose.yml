services:
  docling-serve: 
    build:
      context: .
      dockerfile: Dockerfile
    env_file: 
      - .env
    labels:
      - traefik.http.routers.api-doclingserve-zijchw-4-websecure.middlewares=octonona-allowlist@file
    restart: "no"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 60s
      timeout: 30s
      start_period: 180s
      retries: 5
networks:
  dokploy-network:
    external: true
