services:
  docling-serve:
    build:
      context: .
      dockerfile: Dockerfile.cuda
    environment:
      DOCLING_DEVICE: "cuda:0"
      NVIDIA_VISIBLE_DEVICES: "all"
    env_file:
      - .env
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    labels:
      - traefik.http.routers.api-doclingserve-zijchw-4-websecure.middlewares=octonona-allowlist@file
    restart: "always"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 60s
      timeout: 30s
      start_period: 180s
      retries: 5
networks:
  dokploy-network:
    external: true
